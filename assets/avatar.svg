<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="50%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    <!-- Hair Highlight -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d0c5a" />
      <stop offset="100%" stop-color="#140526" />
    </linearGradient>
    <!-- Skin Tone -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd5c2" />
      <stop offset="100%" stop-color="#fca3b7" />
    </linearGradient>
    <!-- Hoodie -->
    <linearGradient id="hoodieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6200ee" />
      <stop offset="100%" stop-color="#3700b3" />
    </linearGradient>
    <!-- Glowing Shadow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with Gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" />

  <!-- Subtle grid lines overlay for techy aesthetic -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />

  <!-- Body / Hoodie -->
  <path d="M 50 170 C 50 145, 60 135, 80 130 C 85 138, 93 142, 100 142 C 107 142, 115 138, 120 130 C 140 135, 150 145, 150 170 Z" fill="url(#hoodieGrad)" />
  <!-- Hoodie Drawstrings -->
  <path d="M 90 142 L 90 165" stroke="#ff007f" stroke-width="3" stroke-linecap="round" />
  <path d="M 110 142 L 110 165" stroke="#ff007f" stroke-width="3" stroke-linecap="round" />
  <circle cx="90" cy="165" r="3" fill="#ff7b00" />
  <circle cx="110" cy="165" r="3" fill="#ff7b00" />

  <!-- Neck -->
  <path d="M 88 115 L 88 135 L 112 135 L 112 115 Z" fill="url(#skinGrad)" />
  <!-- Neck shadow -->
  <path d="M 88 128 C 95 132, 105 132, 112 128 L 112 135 L 88 135 Z" fill="rgba(0,0,0,0.1)" />

  <!-- Head / Face -->
  <circle cx="100" cy="108" r="32" fill="url(#skinGrad)" />

  <!-- Features -->
  <!-- Cheeks blush -->
  <circle cx="82" cy="115" r="6" fill="#ff007f" opacity="0.25" filter="url(#glow)" />
  <circle cx="118" cy="115" r="6" fill="#ff007f" opacity="0.25" filter="url(#glow)" />
  
  <!-- Eyes -->
  <ellipse cx="86" cy="108" rx="3.5" ry="4" fill="#2d0c5a" />
  <ellipse cx="114" cy="108" rx="3.5" ry="4" fill="#2d0c5a" />
  <!-- Eye sparkles -->
  <circle cx="85" cy="106" r="1" fill="#ffffff" />
  <circle cx="113" cy="106" r="1" fill="#ffffff" />
  <!-- Eyelashes / brows -->
  <path d="M 81 101 C 84 99, 89 101, 91 103" stroke="#2d0c5a" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <path d="M 119 101 C 116 99, 111 101, 109 103" stroke="#2d0c5a" stroke-width="1.5" stroke-linecap="round" fill="none" />

  <!-- Smile -->
  <path d="M 94 120 C 96 124, 104 124, 106 120" stroke="#2d0c5a" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Hair - Back -->
  <path d="M 64 100 C 64 70, 136 70, 136 100 C 136 125, 138 140, 134 145 C 130 135, 126 120, 126 108 L 74 108 C 74 120, 70 135, 66 145 C 62 140, 64 125, 64 100 Z" fill="url(#hairGrad)" />

  <!-- Hair - Front / Bangs -->
  <path d="M 66 100 C 66 76, 75 66, 100 66 C 125 66, 134 76, 134 100 C 134 94, 130 84, 122 84 C 114 84, 110 92, 100 92 C 90 92, 86 84, 78 84 C 70 84, 66 94, 66 100 Z" fill="url(#hairGrad)" />
  <!-- Hair highlights lines -->
  <path d="M 74 80 C 85 73, 115 73, 126 80" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round" fill="none" />

  <!-- Glasses / Developer specs -->
  <rect x="73" y="102" width="22" height="15" rx="5" fill="none" stroke="#ffffff" stroke-width="2.5" />
  <rect x="105" y="102" width="22" height="15" rx="5" fill="none" stroke="#ffffff" stroke-width="2.5" />
  <line x1="95" y1="109" x2="105" y2="109" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <!-- Glasses reflections -->
  <path d="M 76 104 L 88 114" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 108 104 L 120 114" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" />

</svg>
